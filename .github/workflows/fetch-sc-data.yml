name: Fetch SC Data

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch ScreenConnect data
        shell: pwsh
        env:
          SC_URL: ${{ secrets.SC_URL }}
          SC_SECRET: ${{ secrets.SC_SECRET }}
          SC_ORIGIN: ${{ secrets.SC_ORIGIN }}
        run: |
          ./fetch-data.ps1

      - name: Commit and push data.json
        shell: pwsh
        run: |
          git config user.name "FNS RMM Bot"
          git config user.email "actions@github.com"
          git add data.json
          
          # Only commit if data.json actually changed
          $status = git status --porcelain
          if ($status) {
            git commit -m "Update machine data - $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git push
            Write-Host "data.json committed and pushed"
          } else {
            Write-Host "No changes to data.json, skipping commit"
          }
